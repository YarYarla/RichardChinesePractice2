            z-index: 50;

        .drop-zone {

        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>

        function initQuiz() {
            container.innerHTML = '';
            
            vocabData.forEach((question, qIndex) => {

                questionDiv.className = 'glass-panel rounded-2xl p-6 sm:p-10 shadow-xl relative';

        function setupDraggable(item) {
            item.addEventListener('dragstart', (e) => {
                if (isSubmitted) return;
                
                // 清理浏览器默认选中行为，防止带出拖拽虚影
                window.getSelection().removeAllRanges();
                e.dataTransfer.setDragImage(item, item.offsetWidth / 2, item.offsetHeight / 2);

                draggedItem = item;
                setTimeout(() => item.classList.add('dragging'), 0);
            });

            item.addEventListener('dragend', () => {
                draggedItem.classList.remove('dragging');
                draggedItem = null;
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
            });

            // Touch support
            item.addEventListener('touchstart', (e) => {
                if (isSubmitted) return;
                window.getSelection().removeAllRanges();
                draggedItem = item;
                item.classList.add('dragging');
            }, {passive: true});

            item.addEventListener('touchend', (e) => {
                if(!draggedItem) return;
                item.classList.remove('dragging');
                
                const touch = e.changedTouches[0];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const dropZone = targetEl ? targetEl.closest('.drop-zone') : null;
                const otherDragItem = targetEl ? targetEl.closest('.drag-item') : null;

                if (dropZone && dropZone !== item.parentNode) {
                    if (dropZone.classList.contains('flex-col') && dropZone.children.length > 0) {
                        const existingItem = dropZone.children[0];
                        item.parentNode.appendChild(existingItem);
                        dropZone.appendChild(item);
                    } else {
                        dropZone.appendChild(item);
                    }
                } else if (otherDragItem && otherDragItem !== item) {
                    const parent1 = item.parentNode;
                    const parent2 = otherDragItem.parentNode;
                    parent1.appendChild(otherDragItem);
                    parent2.appendChild(item);
                }
                draggedItem = null;
            });
        }

        function setupDropZone(zone) {
            zone.addEventListener('dragover', e => {
                if (isSubmitted) return;
                e.preventDefault();
                zone.classList.add('drag-over');
            });

            zone.addEventListener('dragleave', () => {
                zone.classList.remove('drag-over');
            });

            zone.addEventListener('drop', e => {
                if (isSubmitted || !draggedItem) return;
                e.preventDefault();
                zone.classList.remove('drag-over');

                const targetItem = e.target.closest('.drag-item');

                if (zone.id.startsWith('source-row')) {
                    // Dropping back to pool
                    zone.appendChild(draggedItem);
                } else {
                    // Dropping into a slot
                    if (zone.children.length === 0) {
                        // Empty slot
                        zone.appendChild(draggedItem);
                    } else {
                        // Slot occupied, Swap them
                        const existingItem = zone.children[0];
                        const originZone = draggedItem.parentNode;
                        originZone.appendChild(existingItem);
                        zone.appendChild(draggedItem);
                    }
                }
            });
        }

        function checkAnswers() {
            if (isSubmitted) return;
            isSubmitted = true;
            document.getElementById('action-check').disabled = true;
            document.getElementById('action-check').classList.add('opacity-50', 'cursor-not-allowed');
            
            // Disable dragging
            document.querySelectorAll('.drag-item').forEach(el => el.draggable = false);

            let score = 0;
            const details = [];

            vocabData.forEach((question, index) => {
                const slotsRow = document.getElementById(`slots-row-${index}`);
                const feedbackEl = document.getElementById(`feedback-${index}`);
                
                let userSentence = "";
                Array.from(slotsRow.children).forEach(slot => {
                    if (slot.children.length > 0) {
                        userSentence += slot.children[0].dataset.hz;
                    }
                });

                const isCorrect = (userSentence === question.hz) || (question.altHz && userSentence === question.altHz);

                if (isCorrect) {
                    score++;
                    feedbackEl.className = 'mt-6 bg-emerald-900/30 border border-emerald-800/50 rounded-xl p-6 pop-in text-center';
                    feedbackEl.innerHTML = `<p class="text-emerald-400 font-bold text-xl flex items-center justify-center"><svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Correct</p>`;

                } else {
                    feedbackEl.className = 'mt-6 bg-rose-900/20 border border-rose-800/50 rounded-xl p-6 pop-in';
                    
                    // Generate Correct Answer Blocks
                    let correctHtml = '';
                    question.words.forEach(w => {
                        if (w.py) {

                            }
                            innerHtml += '</div>';
                            correctHtml += `<div class="flex flex-col items-center justify-center h-16 sm:h-20 min-w-[3.5rem] px-2 sm:px-3 bg-slate-800 rounded-lg border border-slate-700/50">${innerHtml}</div>`;
                        } else {
                            correctHtml += `<div class="flex flex-col items-center justify-center h-16 sm:h-20 min-w-[2.5rem] px-2 bg-slate-800 rounded-lg border border-slate-700/50"><span class="text-xl sm:text-2xl zh-font font-bold text-slate-400 whitespace-nowrap leading-none">${w.hz}</span></div>`;
                        }
                    });
                    
                    feedbackEl.innerHTML = `
                        <p class="text-rose-400 font-bold text-xl flex items-center mb-4"><svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> Incorrect</p>
                        <p class="text-slate-400 text-sm mb-2">Correct Sentence:</p>
                        <div class="flex flex-wrap gap-2">${correctHtml}</div>
                    `;
                    feedbackEl.classList.remove('hidden');
                }

                details.push({
                    q: question.hz,
                    correct: isCorrect,
                    userA: userSentence || "(Incomplete)"
                });
            });

            const now = new Date();
            const cnTime = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Shanghai', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(now);
            const usaTime = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(now);
            
            const newRecord = {
                id: Date.now().toString(),
                date: now.toISOString(),
                score: score,
                total: vocabData.length,
                cnTime: cnTime,
                usaTime: usaTime,
                details: details
            };

            testHistory.unshift(newRecord);
            saveCloudHistory();
            renderHistory();
            scrollToRecords();
        }

        // ==========================================
        // 新增：读取学生真实答案并还原现场的核心函数
        // ==========================================
        function loadRecord(id) {
            const record = testHistory.find(r => r.id === id);
            if (!record) return;

            // 锁定系统，禁止拖拽
            isSubmitted = true;
            document.getElementById('action-check').disabled = true;
            document.getElementById('action-check').classList.add('opacity-50', 'cursor-not-allowed');
            document.querySelectorAll('.drag-item').forEach(el => el.draggable = false);

            // 遍历每一题，把词块根据学生的记录放回横线上
            vocabData.forEach((question, qIndex) => {
                const detail = record.details[qIndex];
                const slotsRow = document.getElementById(`slots-row-${qIndex}`);
                const sourceRow = document.getElementById(`source-row-${qIndex}`);
                const feedbackEl = document.getElementById(`feedback-${qIndex}`);

                // 1. 先把所有词块放回下方的池子里清理干净
                Array.from(slotsRow.children).forEach(slot => {
                    if (slot.children.length > 0) sourceRow.appendChild(slot.children[0]);
                });

                // 2. 根据学生的 userA 字符串，精准匹配词块并拖上横线
                let remainingStr = detail ? detail.userA : "";
                if (remainingStr === "(Incomplete)") remainingStr = "";

                let slotIndex = 0;
                while (remainingStr.length > 0 && slotIndex < slotsRow.children.length) {
                    let matchedBlock = null;
                    const availableBlocks = Array.from(sourceRow.querySelectorAll('.drag-item'));
                    for (let block of availableBlocks) {
                        const blockHz = block.dataset.hz;
                        if (remainingStr.startsWith(blockHz)) {
                            matchedBlock = block;
                            break;
                        }
                    }
                    if (matchedBlock) {
                        slotsRow.children[slotIndex].appendChild(matchedBlock);
                        remainingStr = remainingStr.slice(matchedBlock.dataset.hz.length);
                        slotIndex++;
                    } else {
                        break; // 数据异常安全退出
                    }
                }

                // 3. 渲染出对错颜色和正确答案提示
                const isCorrect = detail ? detail.correct : false;

                if (isCorrect) {
                    feedbackEl.className = 'mt-6 bg-emerald-900/30 border border-emerald-800/50 rounded-xl p-6 pop-in text-center';
                    feedbackEl.innerHTML = `<p class="text-emerald-400 font-bold text-xl flex items-center justify-center"><svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Correct</p>`;
                    feedbackEl.classList.remove('hidden');
                } else {
                    feedbackEl.className = 'mt-6 bg-rose-900/20 border border-rose-800/50 rounded-xl p-6 pop-in';
                    
                    let correctHtml = '';
                    question.words.forEach(w => {
                        if (w.py) {
                            const hzA = w.hz.split('');
                            const pyA = w.py.split(' ');
                            let innerHtml = '<div class="flex gap-0.5 sm:gap-1">';
                            for(let i=0; i<hzA.length; i++) {
                                innerHtml += `<div class="flex flex-col items-center justify-end"><span class="text-sm sm:text-base text-sky-400 font-medium mb-1 whitespace-nowrap leading-none">${pyA[i] || ''}</span><span class="text-xl sm:text-2xl zh-font font-bold text-slate-200 whitespace-nowrap leading-none">${hzA[i]}</span></div>`;
                            }
                            innerHtml += '</div>';
                            correctHtml += `<div class="flex flex-col items-center justify-center h-16 sm:h-20 min-w-[3.5rem] px-2 sm:px-3 bg-slate-800 rounded-lg border border-slate-700/50">${innerHtml}</div>`;
                        } else {
                            correctHtml += `<div class="flex flex-col items-center justify-center h-16 sm:h-20 min-w-[2.5rem] px-2 bg-slate-800 rounded-lg border border-slate-700/50"><span class="text-xl sm:text-2xl zh-font font-bold text-slate-400 whitespace-nowrap leading-none">${w.hz}</span></div>`;
                        }
                    });
                    
                    feedbackEl.innerHTML = `
                        <p class="text-rose-400 font-bold text-xl flex items-center mb-4"><svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> Incorrect</p>
                        <p class="text-slate-400 text-sm mb-2">Correct Sentence:</p>
                        <div class="flex flex-wrap gap-2">${correctHtml}</div>
                    `;
                    feedbackEl.classList.remove('hidden');
                }
            });

            // 还原完成后平滑滚动到最顶端第一题
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function fetchCloudHistory() {
            statusEl.textContent = 'SYNCING...';
            try {
                const res = await fetch(`https://kvdb.io/${KVDB_BUCKET_ID}/${STORAGE_KEY}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data && Array.isArray(data)) {
                        testHistory = data;
                        statusEl.textContent = '● SYNCED';
                        statusEl.className = "ml-2 text-xs font-mono bg-emerald-900/50 px-2 py-0.5 rounded text-emerald-400 border border-emerald-800/50";
                    }
                } else {
                    statusEl.textContent = '● READY';
                }
            } catch (e) {
                console.error('Failed to fetch from KVDB:', e);
                statusEl.textContent = '● OFFLINE';
                statusEl.className = "ml-2 text-xs font-mono bg-rose-900/50 px-2 py-0.5 rounded text-rose-400 border border-rose-800/50";
            }
            renderHistory();
        }

        async function saveCloudHistory() {
            statusEl.textContent = 'SAVING...';
            try {
                await fetch(`https://kvdb.io/${KVDB_BUCKET_ID}/${STORAGE_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify(testHistory),
                    headers: { 'Content-Type': 'application/json' }
                });
                statusEl.textContent = '● SYNCED';
                statusEl.className = "ml-2 text-xs font-mono bg-emerald-900/50 px-2 py-0.5 rounded text-emerald-400 border border-emerald-800/50";
            } catch (e) {
                console.error('Failed to save to KVDB:', e);
                statusEl.textContent = '● SAVE FAILED';
                statusEl.className = "ml-2 text-xs font-mono bg-rose-900/50 px-2 py-0.5 rounded text-rose-400 border border-rose-800/50";
            }
        }

        function renderHistory() {
            const listEl = document.getElementById('records-list');
            listEl.innerHTML = '';

            if (testHistory.length === 0) {
                listEl.innerHTML = '<div class="text-center py-10 text-slate-500 glass-panel rounded-xl">No records found yet.</div>';
                return;
            }

            testHistory.forEach((record) => {
                const card = document.createElement('div');
                card.className = 'glass-panel p-5 rounded-xl shadow-md border border-slate-700/50';
                
                const accuracy = Math.round((record.score / record.total) * 100);
                let scoreColor = 'text-emerald-400';
                if(accuracy < 60) scoreColor = 'text-rose-400';
                else if(accuracy < 90) scoreColor = 'text-amber-400';

                card.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 shadow-inner">
                                <span class="text-2xl font-bold ${scoreColor}">${record.score}</span>
                            </div>
                            <div>
                                <p class="text-slate-200 font-medium">Score: ${record.score} / ${record.total}</p>
                                <div class="text-xs text-slate-400 mt-1 space-y-0.5 font-mono">
                                    <p>🇨🇳 CHN: ${record.cnTime}</p>
                                    <p>🇺🇸 USA: ${record.usaTime}</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                            <!-- 修改点：按钮点击事件绑定为加载真实记录的函数 loadRecord -->
                            <button onclick="loadRecord('${record.id}')" class="w-full sm:w-auto px-4 py-2 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 rounded-lg transition-colors text-sm font-medium border border-indigo-500/30 flex justify-center items-center">
                                Review Answers <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                            </button>
                            <button onclick="confirmDelete('${record.id}')" class="w-full sm:w-auto p-2 bg-rose-900/30 hover:bg-rose-600/50 text-rose-400 rounded-lg transition-colors border border-rose-800/50 flex justify-center items-center" title="Delete Record">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function confirmDelete(id) {
            pendingDeleteId = id;
            document.getElementById('delete-modal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.add('hidden');
            pendingDeleteId = null;
        }

        async function executeDelete() {
            if (pendingDeleteId) {
                testHistory = testHistory.filter(r => r.id !== pendingDeleteId);
                renderHistory();
                closeDeleteModal();
                try {
                    await saveCloudHistory();
                } catch(e) {
                    console.error(e);
                }
            }
        }

        function scrollToRecords() {
            document.getElementById('records-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Initialize on load
        window.onload = () => {
            initQuiz();
            fetchCloudHistory();
        };
    </script>
</body>
</html>
